# Copy the custom apps folder to a separate repo

name: Custom apps manifest copy

on:
  push:
    branches: [ "main" ]
    paths: [ "custom-apps/**" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  copy:
  
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Create deploy folder
      run: mkdir ./custom-apps/deploy
    - name: Copy manifest
      run: cp ./custom-apps/manifest.json ./custom-apps/deploy/manifest.json
    - name: Copy Readme
      run: cp ./custom-apps/README.md ./custom-apps/deploy/README.md
    - name: Deploy
      run: |
        set -euo pipefail

        deploy_dir="$(mktemp -d)"
        cp -R ./custom-apps/deploy/. "$deploy_dir/"

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git fetch origin dist/custom-apps || true
        git clean -fdx

        if git rev-parse --verify origin/dist/custom-apps >/dev/null 2>&1; then
          git checkout -B dist/custom-apps origin/dist/custom-apps
        else
          git checkout --orphan dist/custom-apps
        fi

        git rm -r . >/dev/null 2>&1 || true
        cp -R "$deploy_dir"/. .
        git add -A
        git commit -m "Build custom-apps manifest" || exit 0
        git push origin dist/custom-apps
      
