# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Eternal Jukebox Publish

on:
    push:
        branches: ['main']
        paths: ['custom-apps/eternal-jukebox/**']
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ./custom-apps/eternal-jukebox

        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
                  cache-dependency-path: ./package-lock.json
            - name: Install dependencies
              working-directory: ./
              run: npm ci
            - name: Build
              run: npm run build-local
            - name: Copy Readme
              run: cp README.md ./dist/README.md
            - name: Copy preview
              run: cp preview.png ./dist/preview.png
            - name: Copy helper
              run: |
                  cp seamless-helper.ts ./dist/seamless-helper.ts
                  cp start-seamless-helper.ps1 ./dist/start-seamless-helper.ps1
            - name: Deploy
              working-directory: ./
              run: |
                  set -euo pipefail

                  deploy_dir="$(mktemp -d)"
                  cp -R ./custom-apps/eternal-jukebox/dist/. "$deploy_dir/"

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git fetch origin dist/eternal-jukebox || true
                  git clean -fdx

                  if git rev-parse --verify origin/dist/eternal-jukebox >/dev/null 2>&1; then
                      git checkout -B dist/eternal-jukebox origin/dist/eternal-jukebox
                  else
                      git checkout --orphan dist/eternal-jukebox
                  fi

                  git rm -r . >/dev/null 2>&1 || true
                  cp -R "$deploy_dir"/. .
                  git add -A
                  git commit -m "Build eternal-jukebox dist" || exit 0
                  git push origin dist/eternal-jukebox
